# Ember model preset — 64 GB+ Macs.
#
# 64 GB sits in Ember's "40-80 GB" RAM profile (docs/memory.md#ram-profiles-auto-defaults):
# MLX_MAX_RUNNERS=6, 4 GB min free, 8 GB wired headroom. Enough to keep several chat models
# hot at once — a fast MoE, a balanced MoE, and a large dense model at a higher quant for
# quality — plus vision and the pinned autocomplete + embed models, without Ember having to
# evict anything in normal use.
#
# Numbers below are from docs/benchmarks.md, measured on the project's reference machine
# (Apple M5, 24 GB unified memory) — tok/s will differ on your chip, but resident RAM and
# the relative ranking (MoE >> dense, 3-bit faster than 4-bit) carry over.
#
# Copy this file to `ember.yaml` (or point EMBER_CONFIG at it) and edit as needed.

models:
  # --- fast MoE, code-focused: ~9 GB resident, 77 tok/s on the M5 reference machine ---
  - name: deepseek-coder-v2
    mlx: mlx-community/DeepSeek-Coder-V2-Lite-Instruct-4bit
    params: { temperature: 0.0, top_p: 0.95, num_ctx: 16384 }

  # --- balanced MoE, best quality/speed tradeoff: ~19 GB resident, 53 tok/s ---
  - name: qwen3-30b-a3b
    mlx: mlx-community/Qwen3-30B-A3B-Instruct-2507-4bit-DWQ
    params: { temperature: 0.0, top_p: 0.95, top_k: 20, num_ctx: 8192 }

  # --- dense, strong code quality at the cost of speed: ~15 GB resident, 8 tok/s ---
  # Dense models this size are memory-bandwidth bound just like the MoE ones above, but
  # without MoE's sparsity win, so they're much slower per GB — see docs/benchmarks.md's
  # "MoE wins big" takeaway. Worth it when quality matters more than latency.
  - name: qwen2.5-coder-32b
    mlx: mlx-community/Qwen2.5-Coder-32B-Instruct-3bit
    params: { temperature: 0.0, top_p: 0.95, num_ctx: 8192 }

  # --- vision (needs the [vision] extra: pip install "ember-mlx[vision]") ---
  # ~2 GB resident, accepts images.
  - name: qwen2.5-vl
    mlx: mlx-community/Qwen2.5-VL-3B-Instruct-4bit
    vision: true
    params: { temperature: 0.0, num_ctx: 16384 }

# Pinned (always hot, don't compete with the chat/vision runner slots above).
autocomplete:
  name: autocomplete
  mlx: mlx-community/Qwen2.5-Coder-1.5B-4bit       # FIM-capable base model, ~1 GB resident

embed:
  name: embed
  mlx: mlx-community/nomicai-modernbert-embed-base-4bit   # well under 1 GB resident

# Total resident with everything hot: ~46.5 GB across 4 chat/vision runners (well within
# MLX_MAX_RUNNERS=6 for this tier), leaving well over the 4 GB min-free floor plus 8 GB
# wired headroom for the OS. All four chat/vision models can stay loaded simultaneously —
# Ember only starts LRU-evicting if you add more models on top of these.
