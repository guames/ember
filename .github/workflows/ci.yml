name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Apple Silicon runner — the target platform (MLX is arm64 macOS only).
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Test (model-free unit tests)
        run: pytest -q
