name: Release

# Publish ember-mlx to PyPI via Trusted Publishing (OIDC) — no API tokens stored.
# Push a tag like v0.1.0 to build and publish; workflow_dispatch builds only (dry run).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest # pure-Python package — no need for a Mac runner to build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: pipx run build
      - name: Check metadata
        run: pipx run twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Only publish for tag pushes; workflow_dispatch stops after build.
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
