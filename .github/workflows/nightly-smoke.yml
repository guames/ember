name: Nightly smoke

# Separate from ci.yml on purpose: this loads a real model over the network and can be
# slow/flaky on transient HF Hub hiccups, so it must never block or flake per-PR CI.
on:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        mlx-lm: [pinned, latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (pinned mlx-lm)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install (latest mlx-lm, ignoring the ceiling)
        if: matrix.mlx-lm == 'latest'
        run: pip install -U mlx-lm

      - name: Run smoke test
        run: ./scripts/nightly_smoke.sh
